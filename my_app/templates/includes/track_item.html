<style>
    .track-row {
        display: flex; align-items: center; gap: 15px;
        padding: 10px 16px; border-radius: 8px; transition: 0.2s; cursor: pointer;
    }
    .track-row:hover { background: var(--hover-white); }
    .track-row.is-playing { background: rgba(255, 80, 0, 0.1); }

        .track-row.is-playing { background: rgba(255, 80, 0, 0.1); }
    .track-row.is-playing .track-title { color: var(--accent-color); }
    .track-row.is-playing .icon-pause { opacity: 1 !important; }
    .track-row.is-playing img { filter: brightness(0.4); }
    
    .track-icon-wrapper {
        position: relative; width: 48px; height: 48px;
        background: #282828; border-radius: 4px; overflow: hidden;
        display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .track-icon-wrapper img { width: 100%; height: 100%; object-fit: cover; }
    
    .play-icon-svg {
        position: absolute; width: 20px; height: 20px; fill: #fff;
        opacity: 0; transition: 0.2s; z-index: 2;
    }
    .track-row:hover .play-icon-svg { opacity: 1; }
    .track-row:hover img { filter: brightness(0.5); }
    
    .track-info { flex-grow: 1; min-width: 0; }
    .track-title { font-weight: 600; font-size: 15px; margin-bottom: 2px; }
    .track-artist { color: var(--text-dim); font-size: 13px; }
    
    .track-meta { display: flex; align-items: center; gap: 15px; color: var(--text-dim); font-size: 13px; }
</style>

<div class="track-row" data-url="{{ track.audio_file.url }}">
    <div class="track-icon-wrapper">
        {% if track.cover %}
            <img src="{{ track.cover.url }}" alt="cover">
        {% endif %}
        <svg class="play-icon-svg icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg class="play-icon-svg icon-pause" viewBox="0 0 24 24" style="display: none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </div>
    
    <div class="track-info">
        <div class="track-title">{{ track.title }}</div>
        <div class="track-artist">{{ track.artist.user.username }}</div>
    </div>

    <div class="track-meta">
        <a href="{% url 'toggle_favorite' track.id %}" class="like-button">
            <svg class="heart-icon {% if track in user.profile.favorite_album.tracks.all %}is-liked{% endif %}" viewBox="0 0 24 24" width="20" height="20">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
        </a>
        <span class="list-track-duration">--:--</span>
    </div>
</div>
