<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundMess</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #131313;
            --card-bg: #1a1a1a;
            --accent-color: #ff5000;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
            --border-color: rgba(255, 255, 255, 0.1);
            --hover-white: rgba(255, 255, 255, 0.05);
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding-bottom: 90px; 
            min-height: 100vh;
        }

        a { text-decoration: none; color: inherit; transition: 0.2s; }
        
        /* Шапка */
        header { 
            background: rgba(14, 14, 14, 0.8); 
            backdrop-filter: blur(10px);
            padding: 0 30px; 
            margin: 10px;
            border-radius: 15px;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 1px solid var(--border-color); 
            position: sticky; top: 0; z-index: 1001;
            height: 64px;
        }

        .logo { font-size: 20px; font-weight: 800; color: var(--accent-color); letter-spacing: 1px; }
        .nav-links { display: flex; gap: 20px; align-items: center; font-size: 14px; font-weight: 500; }

        /* Контейнер контента */
        main { 
            padding: 30px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        /* Твои стили для лайков и состояний (не менял логику) */
        .heart-icon { fill: none; stroke: #b3b3b3; stroke-width: 2; transition: 0.2s; }
        .heart-icon.is-liked { fill: var(--accent-color); stroke: var(--accent-color); }
        .track-row.is-playing .track-title { color: var(--accent-color); }

        /* Панель плеера (контейнер) */
        .player-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: #1c1c1c; 
            padding: 0 30px; 
            margin: 10px;
            border-radius: 15px;
            display: flex; align-items: center; 
            border-top: 1px solid var(--border-color); 
            z-index: 1000; height: 80px;
        }

        .btn-play-main { 
            background: var(--accent-color); color: white; 
            width: 42px; height: 42px; border-radius: 50%; border: none;
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: 0.2s;
        }

        input[type=range] { accent-color: var(--accent-color); cursor: pointer; }

        /* Формы (общий стиль) */
        input[type="text"], input[type="password"], input[type="email"], textarea, select {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: white;
            padding: 10px;
            border-radius: 6px;
            width: 100%;
            margin-bottom: 15px;
        }
        button[type="submit"] {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">SOUNDMESS</div>
    <nav class="nav-links">
        <a href="{% url 'home' %}">Главная</a>
        {% if user.is_authenticated %}
            <a href="{% url 'profile' %}">Профиль</a>
            <a href="{% url 'logout' %}" style="opacity: 0.6;">Выход</a>
        {% else %}
            <a href="{% url 'login' %}">Войти</a>
            <a href="{% url 'register' %}" style="background: white; color: black; padding: 6px 15px; border-radius: 20px;">Регистрация</a>
        {% endif %}
    </nav>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<div class="player-bar">
    <audio id="main-player" ontimeupdate="updateProgress()"></audio>
    <div class="player-controls">
        <button class="btn-play-main" id="play-pause-btn" onclick="togglePlay()">
            <svg id="play-icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <svg id="pause-icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
    </div>
    <div style="width: 250px; display: flex; align-items: center; gap: 10px; margin-left: 20px;">
        <div class="track-info">
            <div id="player-track-title" class="track-title" style="font-weight:600;"></div>
            <div id="player-track-artist" class="track-artist" style="font-size:12px; color:var(--text-dim);"></div>
        </div>
    </div>
    <div style="flex-grow: 1; display: flex; align-items: center; gap: 10px; margin: 0 30px;">
        <span id="current-time" style="font-size:11px; color:var(--text-dim); min-width:35px;">0:00</span>
        <input type="range" id="progress-bar" value="0" step="1" oninput="seek()" style="flex-grow:1;">
        <span id="total-time" style="font-size:11px; color:var(--text-dim); min-width:35px;">0:00</span>
    </div>
    <div style="display: flex; align-items: center; gap: 10px;">
        <button onclick="toggleMute()" style="background:none; border:none; color:var(--text-dim); cursor:pointer;">
            <svg id="vol-icon-svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                <path id="vol-high" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
                <path id="vol-muted" style="display:none;" d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
            </svg>
        </button>
        <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1" oninput="changeVolume()" style="width: 80px;">
    </div>
</div>

<script>
    const player = document.getElementById('main-player');
    const playBtn = document.getElementById('play-icon');
    const pauseBtn = document.getElementById('pause-icon');
    const progressBar = document.getElementById('progress-bar');
    const trackTitle = document.getElementById('player-track-title');
    const trackArtist = document.getElementById('player-track-artist');
    let currentActiveRow = null;

    document.addEventListener('DOMContentLoaded', () => {
        progressBar.value = 0;
        document.querySelectorAll('.track-row[data-url]').forEach(row => {
            row.addEventListener('click', (e) => {
                if (e.target.closest('.like-button')) return;
                const url = row.getAttribute('data-url');
                const trackId = row.getAttribute('data-id');
                const title = row.querySelector('.track-title').innerText;
                const artist = row.querySelector('.track-artist').innerText;
                if (currentActiveRow === row) { 
                    togglePlay(); 
                } else {
                    if (currentActiveRow) {
                        currentActiveRow.classList.remove('is-playing');
                        const p = currentActiveRow.querySelector('.icon-play');
                        const s = currentActiveRow.querySelector('.icon-pause');
                        if(p) p.style.display = 'block';
                        if(s) s.style.display = 'none';
                    }
                    playNewTrack(url, title, artist, row, trackId);
                }
            });

            const url = row.getAttribute('data-url'); // Берем ссылку на трек
            const durationSpan = row.querySelector('.list-track-duration'); // Находим наш span

            if (url && durationSpan) {
                // Создаем виртуальный аудио-элемент в памяти браузера
                const tempAudio = new Audio(url); 
                
                tempAudio.addEventListener('loadedmetadata', () => {
                    durationSpan.innerText = formatTime(tempAudio.duration);
                });
            }
        });
    });

    function playNewTrack(url, title, artist, row, trackId) {
        player.src = url;
        trackTitle.innerText = title;
        trackArtist.innerText = artist;
        currentActiveRow = row;
        currentActiveRow.classList.add('is-playing');
        player.play();
        updateUI(true);

        if (trackId) {
        fetch(`/history/add/${trackId}/`)
            .then(response => response.json())
            .then(data => console.log('История обновлена'))
            .catch(err => console.log('Ошибка истории:', err));
        }
    }

    function togglePlay() {
        if (!player.src) return;
        if (player.paused) { player.play(); updateUI(true); } 
        else { player.pause(); updateUI(false); }
    }

    function updateUI(isPlaying) {
        playBtn.style.display = isPlaying ? 'none' : 'block';
        pauseBtn.style.display = isPlaying ? 'block' : 'none';
        if (currentActiveRow) {
            const p = currentActiveRow.querySelector('.icon-play');
            const s = currentActiveRow.querySelector('.icon-pause');
            if(p) p.style.display = isPlaying ? 'none' : 'block';
            if(s) s.style.display = isPlaying ? 'block' : 'none';
        }
    }

    function updateProgress() {
        if (!player.duration) return;
        progressBar.max = player.duration;
        progressBar.value = player.currentTime;
        document.getElementById('current-time').innerText = formatTime(player.currentTime);
        document.getElementById('total-time').innerText = formatTime(player.duration);
    }

    function seek() { player.currentTime = progressBar.value; }
    function formatTime(secs) {
        const min = Math.floor(secs / 60);
        const sec = Math.floor(secs % 60);
        return `${min}:${sec < 10 ? '0' : ''}${sec}`;
    }
    function changeVolume() { player.volume = document.getElementById('volume-slider').value; updateVolumeIcon(); }
    function toggleMute() { player.muted = !player.muted; updateVolumeIcon(); }
    function updateVolumeIcon() {
        const h = document.getElementById('vol-high');
        const m = document.getElementById('vol-muted');
        if (player.muted || player.volume === 0) { h.style.display = 'none'; m.style.display = 'block'; } 
        else { h.style.display = 'block'; m.style.display = 'none'; }
    }
</script>
</body>
</html>
